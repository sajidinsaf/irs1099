spring:
  application:
    name: irs1099

  # Database
  datasource:
    url: jdbc:mysql://localhost:3306/irs1099?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Email
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# App Configuration
app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-to-a-256-bit-secret-key}
    expiration-ms: 3600000       # 1 hour
    refresh-expiration-ms: 604800000  # 7 days

  encryption:
    key: ${ENCRYPTION_KEY:change-this-in-production-32-chars}

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

  stripe:
    api-key: ${STRIPE_API_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    prices:
      per-form: ${STRIPE_PRICE_PER_FORM:}
      professional: ${STRIPE_PRICE_PROFESSIONAL:}

  iris:
    base-url: https://api.www4.irs.gov
    test-base-url: https://api.alt.www4.irs.gov
    token-endpoint: /auth/oauth/v2/token
    submit-endpoint: /IRIntakeAcceptanceA2A/1.0/irisa2a/v1/intake-acceptance
    status-endpoint: /IRIntakeAcceptanceA2A/1.0/iris/transstatusorack
    client-id: ${IRIS_CLIENT_ID:}
    use-test-environment: true
    use-mock: true

  verops:
    enabled: ${VEROPS_ENABLED:false}
    base-url: ${VEROPS_BASE_URL:https://app.verops.io}
    service-name: ${VEROPS_SERVICE_NAME:irs1099-dev}
    rum-app-id: ${VEROPS_RUM_APP_ID:rum_d1e8a8c104114024}
    rum-api-key: ${VEROPS_RUM_API_KEY:}
    endpoint: ${VEROPS_ENDPOINT:https://ingest.verops.io/rum/v2/beacon}
    environment: ${VEROPS_ENVIRONMENT:dev}

  turnstile:
    site-key: ${TURNSTILE_SITE_KEY:}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    verify-url: https://challenges.cloudflare.com/turnstile/v0/siteverify
    enabled: ${TURNSTILE_ENABLED:false}

  mail:
    from: ${MAIL_FROM:noreply@irs1099.com}
    base-url: ${APP_BASE_URL:http://localhost:5173}

# Server
server:
  port: 8080
  servlet:
    context-path: /api

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Logging
logging:
  level:
    com.irs1099: DEBUG
    org.springframework.security: INFO

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:irs1099;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Disable mail in dev (use logging instead)
  mail:
    host: localhost
    port: 1025

  devtools:
    restart:
      enabled: false

logging:
  level:
    com.irs1099: DEBUG
    org.springframework.security: DEBUG
