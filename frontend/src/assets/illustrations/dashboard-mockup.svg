<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" fill="none">
  <!-- Browser window frame -->
  <rect width="700" height="440" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <rect width="700" height="40" rx="12" fill="#f8fafc"/>
  <rect y="40" width="700" height="1" fill="#e2e8f0"/>

  <!-- Browser dots -->
  <circle cx="20" cy="20" r="6" fill="#f87171"/>
  <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="20" r="6" fill="#34d399"/>

  <!-- URL bar -->
  <rect x="90" y="10" width="520" height="20" rx="4" fill="#f1f5f9"/>
  <text x="100" y="24" fill="#94a3b8" font-family="Arial" font-size="10">irs1099.visibleai.com/dashboard</text>

  <!-- Top nav bar -->
  <rect y="41" width="700" height="44" fill="#1e3a8a"/>
  <text x="24" y="69" fill="white" font-family="Arial" font-weight="bold" font-size="14">IRS 1099 Filing</text>
  <circle cx="660" cy="63" r="14" fill="#3b82f6"/>
  <text x="660" y="67" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold" font-size="11">JD</text>

  <!-- Welcome text -->
  <text x="30" y="115" fill="#1e293b" font-family="Arial" font-weight="bold" font-size="18">Welcome back, John</text>
