  <text x="46" y="210" fill="#1e293b" font-family="Arial" font-weight="bold" font-size="28">24</text>
  <rect x="140" y="168" width="28" height="28" rx="6" fill="#eff6ff"/>
  <text x="154" y="187" text-anchor="middle" fill="#2563eb" font-family="Arial" font-size="14">📄</text>

  <rect x="200" y="150" width="150" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="216" y="178" fill="#94a3b8" font-family="Arial" font-size="10">Pending</text>
  <text x="216" y="210" fill="#1e293b" font-family="Arial" font-weight="bold" font-size="28">3</text>
  <rect x="310" y="168" width="28" height="28" rx="6" fill="#fefce8"/>
  <text x="324" y="187" text-anchor="middle" fill="#eab308" font-family="Arial" font-size="14">⏳</text>

  <rect x="370" y="150" width="150" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="386" y="178" fill="#94a3b8" font-family="Arial" font-size="10">Accepted</text>
  <text x="386" y="210" fill="#1e293b" font-family="Arial" font-weight="bold" font-size="28">19</text>
  <rect x="480" y="168" width="28" height="28" rx="6" fill="#f0fdf4"/>
  <text x="494" y="187" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="14">✓</text>

  <rect x="540" y="150" width="130" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="556" y="178" fill="#94a3b8" font-family="Arial" font-size="10">Needs Attention</text>
  <text x="556" y="210" fill="#1e293b" font-family="Arial" font-weight="bold" font-size="28">2</text>
  <rect x="632" y="168" width="28" height="28" rx="6" fill="#fef2f2"/>
  <text x="646" y="187" text-anchor="middle" fill="#ef4444" font-family="Arial" font-size="14">!</text>

  <!-- Recent submissions table -->
  <rect x="30" y="250" width="640" height="170" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="46" y="278" fill="#1e293b" font-family="Arial" font-weight="bold" font-size="14">Recent Submissions</text>

  <!-- Table header -->
  <rect x="30" y="290" width="640" height="28" fill="#f8fafc"/>
  <text x="50" y="309" fill="#64748b" font-family="Arial" font-weight="bold" font-size="10">Form Type</text>
  <text x="170" y="309" fill="#64748b" font-family="Arial" font-weight="bold" font-size="10">Tax Year</text>
  <text x="280" y="309" fill="#64748b" font-family="Arial" font-weight="bold" font-size="10">Records</text>
  <text x="380" y="309" fill="#64748b" font-family="Arial" font-weight="bold" font-size="10">Status</text>
  <text x="520" y="309" fill="#64748b" font-family="Arial" font-weight="bold" font-size="10">Submitted</text>

  <!-- Row 1 -->
  <text x="50" y="340" fill="#1e293b" font-family="Arial" font-size="11">1099-NEC</text>
  <text x="170" y="340" fill="#1e293b" font-family="Arial" font-size="11">2025</text>
  <text x="280" y="340" fill="#1e293b" font-family="Arial" font-size="11">12</text>
  <rect x="370" y="328" width="70" height="20" rx="10" fill="#f0fdf4"/>
  <text x="405" y="342" text-anchor="middle" fill="#16a34a" font-family="Arial" font-weight="bold" font-size="10">Accepted</text>
  <text x="520" y="340" fill="#94a3b8" font-family="Arial" font-size="11">Jan 28, 2026</text>

  <!-- Row 2 -->
  <text x="50" y="370" fill="#1e293b" font-family="Arial" font-size="11">1099-MISC</text>
  <text x="170" y="370" fill="#1e293b" font-family="Arial" font-size="11">2025</text>
  <text x="280" y="370" fill="#1e293b" font-family="Arial" font-size="11">5</text>
  <rect x="370" y="358" width="70" height="20" rx="10" fill="#fefce8"/>
  <text x="405" y="372" text-anchor="middle" fill="#ca8a04" font-family="Arial" font-weight="bold" font-size="10">Pending</text>
  <text x="520" y="370" fill="#94a3b8" font-family="Arial" font-size="11">Feb 14, 2026</text>

  <!-- Row 3 -->
  <text x="50" y="400" fill="#1e293b" font-family="Arial" font-size="11">1099-INT</text>
  <text x="170" y="400" fill="#1e293b" font-family="Arial" font-size="11">2025</text>
  <text x="280" y="400" fill="#1e293b" font-family="Arial" font-size="11">8</text>
  <rect x="370" y="388" width="70" height="20" rx="10" fill="#f0fdf4"/>
  <text x="405" y="402" text-anchor="middle" fill="#16a34a" font-family="Arial" font-weight="bold" font-size="10">Accepted</text>
  <text x="520" y="400" fill="#94a3b8" font-family="Arial" font-size="11">Mar 15, 2026</text>
